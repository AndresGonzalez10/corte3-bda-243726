version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: clinica_pg
    env_file: .env
    ports:
      - '${PG_PORT_EXTERNAL}:${PG_PORT_INTERNAL}'
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./schema_corte3.sql:/docker-entrypoint-initdb.d/00_schema.sql
      - ./backend/01_procedures.sql:/docker-entrypoint-initdb.d/01_procedures.sql
      - ./backend/02_triggers.sql:/docker-entrypoint-initdb.d/02_triggers.sql
      - ./backend/03_views.sql:/docker-entrypoint-initdb.d/03_views.sql
      - ./backend/04_roles_y_permisos.sql:/docker-entrypoint-initdb.d/04_roles_y_permisos.sql
      - ./backend/05_rls.sql:/docker-entrypoint-initdb.d/05_rls.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clinica_redis
    ports:
      - '${REDIS_PORT_EXTERNAL}:${REDIS_PORT_INTERNAL}'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: clinica_api
    env_file: .env
    ports:
      - '${API_PORT_EXTERNAL}:${API_PORT_INTERNAL}'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: 
      context: ./frontend
      args:
        # Inyecta la variable al Dockerfile durante la construcción
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: clinica_frontend
    env_file: .env
    ports:
      - '${FRONTEND_PORT_EXTERNAL}:${FRONTEND_PORT_INTERNAL}'
    depends_on:
      - api

volumes:
  pg_data: