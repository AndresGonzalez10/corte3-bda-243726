version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: clinica_pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clinica_vet
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clinica_redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: clinica_api
    ports:
      - '4000:4000'
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: clinica_vet
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pg_data: